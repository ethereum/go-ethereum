name: Windows Runner Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/windows-smoke.yml'

jobs:
  windows:
    name: Windows ${{ matrix.arch }}
    runs-on: [self-hosted, windows, x64]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            mingw: 'C:\msys64\mingw64'
          - arch: '386'
            mingw: 'C:\msys64\mingw32'
    env:
      GETH_ARCH: ${{ matrix.arch }}
      GETH_MINGW: ${{ matrix.mingw }}
      GETH_CC: ${{ matrix.mingw }}\bin\gcc.exe
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Show tool versions
        shell: cmd
        run: |
          echo === arch: %GETH_ARCH% ===
          go version
          "%GETH_CC%" --version

      - name: Build
        shell: cmd
        run: |
          set PATH=%GETH_MINGW%\bin;%PATH%
          go run build/ci.go install -arch %GETH_ARCH% -cc %GETH_CC%

      - name: Test
        shell: cmd
        run: |
          set PATH=%GETH_MINGW%\bin;%PATH%
          go run build/ci.go test -arch %GETH_ARCH% -cc %GETH_CC% -short
